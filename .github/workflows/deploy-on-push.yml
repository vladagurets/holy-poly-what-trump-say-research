# Run install-systemd-timer.sh on the server when something is pushed to the default branch.
# Requires: self-hosted runner on the server, and repo secret DEPLOY_PATH = path to repo on server (e.g. /root/apps/holy-poly-what-trump-say-research).

name: Deploy on push

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull and install timer
        env:
          HOME: /home/runner
          GIT_SSH_COMMAND: "ssh -i /home/runner/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new"
        run: |
          git config --global --add safe.directory "${{ secrets.DEPLOY_PATH }}"
          cd "${{ secrets.DEPLOY_PATH }}"
          git pull --ff-only
          sudo ./install-systemd-timer.sh
